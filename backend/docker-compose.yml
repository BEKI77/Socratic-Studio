services:
  db:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: socratic_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata: